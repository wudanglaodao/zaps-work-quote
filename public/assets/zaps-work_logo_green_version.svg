<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8faf9; }
      .panel { fill: #ffffff; stroke: #e4e8e6; stroke-width: 1; }
      .shell { fill: #070b09; }
      .ink { fill: #0b1110; }
      .muted { fill: #5c6861; }
      .subtle { fill: #7b8781; }
      .green { fill: #16a34a; }
      .green-soft { fill: #22c55e; }
      .green-dark { fill: #4ade80; }
      .white { fill: #f8faf9; }
      .label {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 650;
        letter-spacing: 0.02em;
      }
      .caption {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 400;
      }
      .wordmark {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 680;
        letter-spacing: -0.055em;
      }
      .wordmark-compact {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 720;
        letter-spacing: -0.075em;
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000" />

  <text x="80" y="82" class="label ink">zaps.work green wordmark version</text>
  <text x="80" y="112" class="caption muted">Accent lockups where the brand color leads. Keep the primary logo black/white for neutral contexts.</text>

  <rect x="80" y="160" width="1440" height="250" rx="16" class="panel" />
  <text x="120" y="214" class="label muted">RECOMMENDED GREEN LOCKUP</text>
  <text x="120" y="315" class="wordmark" font-size="104">
    <tspan class="green">zaps</tspan><tspan class="green">.</tspan><tspan class="ink">work</tspan>
  </text>
  <text x="122" y="360" class="caption muted">Use when the logo appears inside product surfaces, launch graphics, or green-accented headers.</text>

  <rect x="80" y="450" width="450" height="215" rx="16" class="panel" />
  <text x="120" y="504" class="label muted">A / GREEN ZAPS</text>
  <text x="120" y="582" class="wordmark" font-size="62">
    <tspan class="green">zaps</tspan><tspan class="green">.</tspan><tspan class="ink">work</tspan>
  </text>
  <text x="120" y="624" class="caption muted">Best balance: brand color + readable product name.</text>

  <rect x="575" y="450" width="450" height="215" rx="16" class="panel" />
  <text x="615" y="504" class="label muted">B / GREEN DOT ONLY</text>
  <text x="615" y="582" class="wordmark" font-size="62">
    <tspan class="ink">zaps</tspan><tspan class="green">.</tspan><tspan class="ink">work</tspan>
  </text>
  <text x="615" y="624" class="caption muted">Default production mark. Use most often.</text>

  <rect x="1070" y="450" width="450" height="215" rx="16" class="panel" />
  <text x="1110" y="504" class="label muted">C / MONO GREEN</text>
  <text x="1110" y="582" class="wordmark" font-size="62">
    <tspan class="green">zaps.work</tspan>
  </text>
  <text x="1110" y="624" class="caption muted">Use sparingly for small badges or single-color merch.</text>

  <rect x="80" y="705" width="690" height="220" rx="16" class="shell" />
  <text x="120" y="759" class="label" fill="#a8b3ad">DARK MODE GREEN LOCKUP</text>
  <text x="120" y="840" class="wordmark" font-size="72">
    <tspan class="green-dark">zaps</tspan><tspan class="green-dark">.</tspan><tspan class="white">work</tspan>
  </text>
  <text x="120" y="886" class="caption" fill="#a8b3ad">Use brighter green in dark mode to keep the accent alive.</text>

  <rect x="810" y="705" width="710" height="220" rx="16" class="panel" />
  <text x="850" y="759" class="label muted">FAVICON / SMALL MARK</text>

  <g transform="translate(850 795)">
    <rect x="0" y="0" width="96" height="96" rx="22" class="shell" />
    <text x="25" y="64" class="wordmark-compact green-dark" font-size="54">z</text>
    <circle cx="68" cy="68" r="5.5" class="green-dark" />
  </g>

  <g transform="translate(990 812)">
    <rect x="0" y="0" width="64" height="64" rx="14" class="shell" />
    <text x="18" y="44" class="wordmark-compact green-dark" font-size="36">z</text>
    <circle cx="46" cy="46" r="4" class="green-dark" />
    <text x="2" y="94" class="caption muted">64px</text>
  </g>

  <g transform="translate(1095 828)">
    <rect x="0" y="0" width="32" height="32" rx="7" class="shell" />
    <text x="9" y="23" class="wordmark-compact green-dark" font-size="18">z</text>
    <circle cx="23" cy="23" r="2.2" class="green-dark" />
    <text x="-2" y="78" class="caption muted">32px</text>
  </g>

  <g transform="translate(1180 836)">
    <rect x="0" y="0" width="16" height="16" rx="4" class="shell" />
    <text x="4.5" y="12" class="wordmark-compact green-dark" font-size="9.5">z</text>
    <circle cx="11.8" cy="11.8" r="1.1" class="green-dark" />
    <text x="-2" y="70" class="caption muted">16px</text>
  </g>

  <text x="1290" y="822" class="caption ink">Small icon can go full green because it is not competing with the full wordmark.</text>
  <text x="1290" y="856" class="caption muted">For headers, prefer green `zaps` + black/white `.work`.</text>
  <text x="1290" y="890" class="caption muted">Avoid full green wordmark in dense app UI.</text>
</svg>

<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8faf9; }
      .panel { fill: #ffffff; stroke: #e4e8e6; stroke-width: 1; }
      .ink { fill: #0b1110; }
      .muted { fill: #5c6861; }
      .subtle { fill: #7b8781; }
      .green { fill: #16a34a; }
      .green-dark { fill: #4ade80; }
      .shell { fill: #070b09; }
      .white { fill: #f8faf9; }
      .line { stroke: #e4e8e6; stroke-width: 1; }
      .label {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .caption {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 400;
      }
      .wordmark {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 680;
        letter-spacing: -0.055em;
      }
      .wordmark-soft {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 620;
        letter-spacing: -0.04em;
      }
      .wordmark-compact {
        font-family: "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 720;
        letter-spacing: -0.075em;
      }
      .mono {
        font-family: "Geist Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000" />

  <text x="80" y="82" class="label ink">zaps.work logo direction</text>
  <text x="80" y="112" class="caption muted">Wordmark-first identity. No arrows, documents, checks, charts, or feature metaphors. The green period is the brand anchor.</text>

  <rect x="80" y="160" width="1440" height="260" rx="16" class="panel" />
  <text x="120" y="214" class="label muted">PRIMARY WORDMARK</text>
  <text x="120" y="319" class="wordmark ink" font-size="104">
    <tspan>zaps</tspan><tspan class="green">.</tspan><tspan>work</tspan>
  </text>
  <text x="122" y="365" class="caption muted">Use this as the main logo in headers, quote PDFs, tool pages, and SEO landing pages.</text>

  <g transform="translate(1040 214)">
    <rect x="0" y="0" width="390" height="146" rx="12" fill="#f1f4f2" stroke="#e4e8e6" />
    <text x="24" y="40" class="caption subtle">Brand detail</text>
    <circle cx="32" cy="84" r="7" class="green" />
    <text x="54" y="89" class="caption ink">The period becomes the reusable status mark.</text>
    <text x="24" y="121" class="caption muted">Use it for active tools, quote status, and favicon.</text>
  </g>

  <rect x="80" y="460" width="450" height="220" rx="16" class="panel" />
  <text x="120" y="514" class="label muted">A / BALANCED</text>
  <text x="120" y="590" class="wordmark-soft ink" font-size="64">
    <tspan>zaps</tspan><tspan class="green">.</tspan><tspan>work</tspan>
  </text>
  <text x="120" y="632" class="caption muted">Softer weight for content-heavy pages.</text>

  <rect x="575" y="460" width="450" height="220" rx="16" class="panel" />
  <text x="615" y="514" class="label muted">B / COMPACT HEADER</text>
  <text x="615" y="590" class="wordmark-compact ink" font-size="62">
    <tspan>zaps</tspan><tspan class="green">.</tspan><tspan>work</tspan>
  </text>
  <text x="615" y="632" class="caption muted">Tighter lockup for app chrome and mobile header.</text>

  <rect x="1070" y="460" width="450" height="220" rx="16" class="panel" />
  <text x="1110" y="514" class="label muted">C / EDITORIAL</text>
  <text x="1110" y="590" class="wordmark-soft ink" font-size="58" letter-spacing="-0.01em">
    <tspan>zaps</tspan><tspan class="green">.</tspan><tspan>work</tspan>
  </text>
  <text x="1110" y="632" class="caption muted">Quieter tone for guides, templates, and docs.</text>

  <rect x="80" y="720" width="690" height="210" rx="16" class="shell" />
  <text x="120" y="774" class="label" fill="#a8b3ad">DARK MODE LOCKUP</text>
  <text x="120" y="852" class="wordmark white" font-size="72">
    <tspan>zaps</tspan><tspan class="green-dark">.</tspan><tspan>work</tspan>
  </text>
  <text x="120" y="895" class="caption" fill="#a8b3ad">The green period brightens in dark mode for contrast.</text>

  <rect x="810" y="720" width="710" height="210" rx="16" class="panel" />
  <text x="850" y="774" class="label muted">FAVICON / APP ICON</text>

  <g transform="translate(850 804)">
    <rect x="0" y="0" width="92" height="92" rx="20" class="shell" />
    <text x="25" y="62" class="wordmark white" font-size="52" letter-spacing="-0.08em">z</text>
    <circle cx="66" cy="65" r="5.5" class="green-dark" />
  </g>

  <g transform="translate(980 816)">
    <rect x="0" y="0" width="64" height="64" rx="14" class="shell" />
    <text x="18" y="44" class="wordmark white" font-size="36" letter-spacing="-0.08em">z</text>
    <circle cx="46" cy="46" r="4" class="green-dark" />
    <text x="0" y="92" class="caption muted">64px</text>
  </g>

  <g transform="translate(1084 832)">
    <rect x="0" y="0" width="32" height="32" rx="7" class="shell" />
    <text x="9" y="23" class="wordmark white" font-size="18" letter-spacing="-0.08em">z</text>
    <circle cx="23" cy="23" r="2.2" class="green-dark" />
    <text x="-2" y="76" class="caption muted">32px</text>
  </g>

  <g transform="translate(1160 840)">
    <rect x="0" y="0" width="16" height="16" rx="4" class="shell" />
    <text x="4.5" y="12" class="wordmark white" font-size="9.5" letter-spacing="-0.08em">z</text>
    <circle cx="11.8" cy="11.8" r="1.1" class="green-dark" />
    <text x="-2" y="68" class="caption muted">16px</text>
  </g>

  <line x1="1240" y1="770" x2="1240" y2="900" class="line" />
  <text x="1270" y="814" class="caption ink">Primary favicon uses typography, not a product icon.</text>
  <text x="1270" y="846" class="caption muted">The green dot carries the same identity as the wordmark period.</text>
  <text x="1270" y="878" class="caption muted">This keeps the brand mature and avoids template-logo metaphors.</text>
</svg>
